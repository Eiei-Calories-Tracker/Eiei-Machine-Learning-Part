
x-airflow-common: &airflow-common
  build: ./airflow
  env_file:
    - ./secrets/.env
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__FERNET_KEY='eTN7uF_om7bAgKHYykGrOUSnzQ1TV8oZv50CsiEqsJQ='
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - MLFLOW_TRACKING_URI=http://mlflow:5000
    - AIRFLOW__WEBSERVER__SECRET_KEY='tKtdEpwrhaEQ97ePEfVVbg'
    - PYTHONPATH=/opt/airflow
  volumes:
    - ./.git:/opt/airflow/.git
    - ./airflow/dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./mockData:/opt/airflow/mockData
    - ./.dvc:/opt/airflow/.dvc
    - /var/run/docker.sock:/var/run/docker.sock
    - ./airflow/mlflow_artifacts:/mlruns
    - ./airflow/logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:14
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5435:5432"
    restart: always

  mlflow:
    build: ./mlflow
    container_name: mlflow
    user: "50000:0"
    volumes:
      - ./airflow/mlflow_artifacts:/mlruns
    command: >
      mlflow server 
      --backend-store-uri postgresql://airflow:airflow@postgres:5432/mlflow 
      --default-artifact-root mlflow-artifacts:/
      --host 0.0.0.0 
      --port 5000
      --serve-artifacts
    environment:
      - UMASK=000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      fix-permissions:
        condition: service_completed_successfully
    restart: always

  fix-permissions:
    image: alpine
    user: root
    volumes:
      - ./airflow/mlflow_artifacts:/mlruns
    command: sh -c "chown -R 50000:0 /mlruns && chmod -R 777 /mlruns"

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db init &&
      airflow users create
      --username admin
      --password admin
      --firstname admin
      --lastname admin
      --role Admin
      --email admin@example.com"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  fastapi:
    build: ./fastapi
    container_name: fastapi
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./src:/app/src
      - ./fastapi/main.py:/app/main.py
      - ./airflow/mlflow_artifacts:/mlruns
    ports:
      - "7860:7860"
    depends_on:
      - mlflow
    restart: always

volumes:
  postgres_data:
